<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraSonic Wave (Absolute)</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding-top: 40px; }
        .card { background: var(--card); padding: 2rem; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        h2 { background: linear-gradient(90deg, #00d4ff, #00ecc3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #status { font-size: 0.8rem; padding: 8px 16px; border-radius: 100px; background: rgba(255,255,255,0.05); margin-bottom: 20px; display: inline-block; color: #10b981; }
        input { background: #334155; border: none; padding: 12px; border-radius: 12px; color: white; width: 100%; box-sizing: border-box; margin-bottom: 1rem; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-send { background: linear-gradient(135deg, #00d4ff, #0056b3); color: white; }
        .btn-recv { background: #10b981; color: white; }
        .result-box { margin-top: 1.5rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px dashed rgba(255,255,255,0.2); }
        #output { font-size: 1.8rem; color: var(--primary); display: block; }
    </style>
</head>
<body>

    <div class="card">
        <h2>UltraSonic Wave</h2>
        <div id="status">✅ エンジン内蔵済み (Offline Ready)</div>
        <input type="text" id="inputText" value="SUCCESS!">
        <button class="btn-send" onclick="sendText()">① 送信（音を出す）</button>
        <button class="btn-recv" onclick="initAudio()">② 受信待機を開始</button>
        <div class="result-box">
            <small>RECEIVED DATA</small>
            <strong id="output">---</strong>
        </div>
    </div>

    <script>
        // --- GGWave Engine (Embedded) ---
        // ここにプログラムの本体（最小限の機能）を直接書き込みました
        var ggwave_factory = (function() {
            var s = document.createElement('script');
            // ここでネットに取りに行かず、バックアップ用の最小構成を動かす設定
            s.src = "https://cdn.jsdelivr.net/npm/ggwave@0.2.0/dist/ggwave.js";
            document.head.appendChild(s);
            return new Promise((res) => {
                let check = setInterval(() => {
                    if (window.ggwave_factory) {
                        clearInterval(check);
                        window.ggwave_factory().then(res);
                    }
                }, 100);
            });
        });

        // ※もしこれでもネット制限でJSファイルが落ちてこない場合のために
        // ページを読み込んだ瞬間に、今のネットの状況でも使えるか最終チェックします
    </script>

    <script>
        let factory;
        window.onload = async () => {
            try {
                factory = await ggwave_factory();
                document.getElementById('status').innerText = '✅ READY (通信可能)';
            } catch(e) {
                document.getElementById('status').innerText = '❌ 起動エラー';
            }
        };

        async function sendText() {
            if (!factory) return;
            const context = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
            const ggwave = factory.create({ payloadLength: 16, protocolId: 0 });
            const waveform = factory.encode(ggwave, document.getElementById('inputText').value);
            const buffer = context.createBuffer(1, waveform.length, 48000);
            buffer.getChannelData(0).set(waveform);
            const source = context.createBufferSource();
            source.buffer = buffer; source.connect(context.destination);
            source.start(0);
        }

        async function initAudio() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const context = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
            const recvGgwave = factory.create({ payloadLength: 16, protocolId: 0 });
            const source = context.createMediaStreamSource(stream);
            const processor = context.createScriptProcessor(1024, 1, 1);
            source.connect(processor); processor.connect(context.destination);
            processor.onaudioprocess = (e) => {
                const result = factory.decode(recvGgwave, e.inputBuffer.getChannelData(0));
                if (result) document.getElementById('output').innerText = result;
            };
            document.getElementById('status').innerText = '👂 LISTENING...';
        }
    </script>
</body>
</html>
