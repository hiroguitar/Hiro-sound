<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>My Sonic Engine</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; text-align: center; padding: 40px; }
        .btn { padding: 20px; width: 200px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin: 10px; }
        #indicator { width: 50px; height: 50px; border-radius: 50%; background: #333; margin: 20px auto; transition: 0.2s; }
    </style>
</head>
<body>
    <h2>自作エンジン：超音波センサー</h2>
    <div id="status">Ready</div>
    <div id="indicator"></div>

    <button class="btn" style="background: #00d4ff;" onclick="sendSignal()">① 信号送信 (18kHz)</button>
    <button class="btn" style="background: #10b981;" onclick="startListening()">② 受信スタート</button>

    <script>
        const FREQ = 18000; // 超音波の周波数
        let audioCtx;

        // ① 送信機能
        function sendSignal() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = FREQ;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            // 0.5秒間だけ鳴らす
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // ② 受信機能
        async function startListening() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            document.getElementById('status').innerText = "👂 監視中...";

            function check() {
                analyser.getByteFrequencyData(dataArray);
                // 周波数からインデックスを計算
                const index = Math.round(FREQ / (audioCtx.sampleRate / analyser.fftSize));
                const volume = dataArray[index];

                if (volume > 100) { // 一定以上の音量を検知したら
                    document.getElementById('indicator').style.background = "#00ff00";
                    document.getElementById('status').innerText = "✨ 受信成功！";
                    setTimeout(() => {
                        document.getElementById('indicator').style.background = "#333";
                        document.getElementById('status').innerText = "👂 監視中...";
                    }, 500);
                }
                requestAnimationFrame(check);
            }
            check();
        }
    </script>
</body>
</html>
