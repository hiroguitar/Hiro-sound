<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超音波テスト・最終版</title>
    <script src="https://cdn.jsdelivr.net/npm/ggwave/dist/ggwave.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 30px; background: #eef2f3; color: #333; }
        .card { background: white; margin: 20px auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 15px 25px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background: #007bff; color: white; margin: 10px; transition: 0.3s; width: 100%; }
        button:active { transform: scale(0.98); background: #0056b3; }
        input { padding: 12px; font-size: 16px; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        #status { margin: 15px; padding: 10px; font-size: 14px; background: #fff3cd; border-radius: 5px; }
        .log { font-size: 12px; color: #666; text-align: left; background: #eee; padding: 10px; border-radius: 5px; overflow-y: scroll; height: 100px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>超音波通信テスト</h2>
        <div id="status">⏳ ライブラリを読み込み中...</div>
        
        <input type="text" id="inputText" value="Hello!">
        <button onclick="sendText()">① 音を出す（送信）</button>
        <button id="initBtn" onclick="initAudio()" style="background: #28a745;">② 受信モード開始</button>
        
        <hr>
        <div>受信文字: <strong id="output" style="font-size: 24px; color: #dc3545;">---</strong></div>
    </div>

    <div class="card">
        <p>デバッグログ（エラー確認用）</p>
        <div id="log" class="log"></div>
    </div>

    <script>
        const log = (msg) => {
            const el = document.getElementById('log');
            el.innerHTML += `> ${msg}<br>`;
            el.scrollTop = el.scrollHeight;
        };

        let factory;

        // ライブラリの初期化
        window.onload = () => {
            log('ページを読み込みました');
            if (typeof ggwave_factory === 'undefined') {
                log('エラー: ggwaveが読み込めていません。ネット接続を確認してください。');
                document.getElementById('status').innerText = '❌ ライブラリ読込失敗';
                return;
            }

            ggwave_factory().then(f => {
                factory = f;
                log('ggwave factoryの準備完了');
                document.getElementById('status').innerText = '✅ 準備OK！ボタンを押してね';
                document.getElementById('status').style.background = '#d4edda';
            }).catch(err => {
                log('初期化エラー: ' + err);
            });
        };

        async function sendText() {
            if (!factory) return log('エラー: まだ準備ができていません');
            log('送信処理を開始...');

            try {
                const context = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                await context.resume();
                log('AudioContextを起動: ' + context.state);

                const ggwave = factory.create({ payloadLength: 16, protocolId: 0 });
                const text = document.getElementById('inputText').value;
                const waveform = factory.encode(ggwave, text);
                
                const buffer = context.createBuffer(1, waveform.length, 48000);
                buffer.getChannelData(0).set(waveform);
                
                const source = context.createBufferSource();
                source.buffer = buffer;
                source.connect(context.destination);
                source.onended = () => {
                    context.close();
                    log('再生終了・リソース解放');
                };
                source.start(0);
                log('音を出しました！');
            } catch (err) {
                log('送信エラー: ' + err);
            }
        }

        async function initAudio() {
            log('マイク起動を試みます...');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const context = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                await context.resume();
                
                const recvGgwave = factory.create({ payloadLength: 16, protocolId: 0 });
                const source = context.createMediaStreamSource(stream);
                const processor = context.createScriptProcessor(1024, 1, 1);

                source.connect(processor);
                processor.connect(context.destination);

                processor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    const result = factory.decode(recvGgwave, inputData);
                    if (result) {
                        document.getElementById('output').innerText = result;
                        log('★受信成功: ' + result);
                    }
                };
                document.getElementById('status').innerText = '👂 受信待機中...';
                log('受信モード起動成功');
            } catch (err) {
                log('マイクエラー: ' + err);
                alert('マイクを許可してください');
            }
        }
    </script>
</body>
</html>
