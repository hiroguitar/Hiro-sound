<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug: UltraSonic Wave</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; background: var(--primary); color: #0f172a; }
        .log-area { width: 100%; max-width: 400px; margin-top: 20px; background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; border-radius: 10px; height: 150px; overflow-y: scroll; border: 1px solid #333; }
        .error { color: #ff4444; }
    </style>
</head>
<body>

    <div class="card">
        <h2>追跡モード</h2>
        <div id="status" style="margin-bottom:15px;">🔍 通信を監視中...</div>
        <button onclick="testSound()">1. テスト音（1kHz）を鳴らす</button>
        <button onclick="sendUltra()">2. 超音波送信（ggwave）</button>
        <button onclick="location.reload()" style="background:#666; color:white;">ページ再読み込み</button>
    </div>

    <div class="log-area" id="debugLog">--- 追跡ログ ---<br></div>

    <script>
        // 画面にログを出す魔法
        const debugLog = document.getElementById('debugLog');
        function trace(msg, isError = false) {
            const time = new Date().toLocaleTimeString();
            debugLog.innerHTML += `<span class="${isError ? 'error' : ''}">[${time}] ${msg}</span><br>`;
            debugLog.scrollTop = debugLog.scrollHeight;
        }

        trace("ページを読み込みました");

        // ライブラリ読み込み追跡
        const script = document.createElement('script');
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/ggwave/0.2.0/ggwave.js";
        trace(`ライブラリを読込中: ${script.src}`);

        script.onload = () => {
            trace("✅ ggwave.js の読込に成功！");
            document.getElementById('status').innerText = "✅ エンジン準備OK";
        };

        script.onerror = () => {
            trace("❌ ggwave.js の読込に失敗！(ブロックされました)", true);
            document.getElementById('status').innerText = "❌ 通信エラー";
        };

        document.head.appendChild(script);

        // 1. スピーカー単体テスト
        async function testSound() {
            trace("テスト音の再生を試みます...");
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') {
                    trace("⚠️ AudioContextが待機中。画面をタップしてください。");
                    await ctx.resume();
                }
                const osc = ctx.createOscillator();
                osc.connect(ctx.destination);
                osc.frequency.value = 1000;
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
                trace("✅ テスト音（1kHz）再生命令を出しました。");
            } catch (e) {
                trace(`❌ 音再生エラー: ${e.message}`, true);
            }
        }

        // 2. ggwave送信テスト
        async function sendUltra() {
            if (typeof ggwave_factory === 'undefined') {
                trace("❌ エラー: ggwaveが読み込まれていません", true);
                return;
            }
            trace("ggwave送信準備中...");
            try {
                const factory = await ggwave_factory();
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const gg = factory.create({ payloadLength: 8, protocolId: 0 });
                const wave = factory.encode(gg, "HI!");
                const buf = ctx.createBuffer(1, wave.length, 48000);
